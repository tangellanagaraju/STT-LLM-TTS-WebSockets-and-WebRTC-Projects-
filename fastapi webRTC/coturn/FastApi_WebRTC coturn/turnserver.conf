# TURN listener port for UDP and TCP (Default: 3478).
listening-port=3478

# TURN listener port for TLS (Default: 5349).
tls-listening-port=5349

# Use fingerprints in the TURN messages.
fingerprint

# Use 'Static' authentication secret value (a string) for TURN REST API.
use-auth-secret
static-auth-secret=Some-Really-Long-Str0ng-password-Secret

# Realm is required for auth secret
realm=localhost

# Lower and upper bounds of the UDP relay endpoints:
min-port=49152
max-port=65535

# Verbose mode
verbose

# Disable RFC5780 (NAT behavior discovery) and other non-essential features
no-rfc5780
no-stun-backward-compatibility

# Limit resources
total-quota=100
stale-nonce=600
