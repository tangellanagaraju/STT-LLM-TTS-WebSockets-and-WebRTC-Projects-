<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>WebRTC Premium - Real-time Signaling</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel='stylesheet' type='text/css' media='screen' href='styles.css'>
</head>
<body>
    <div class="container">
        <header>
            <h1>WebRTC Connect</h1>
            <p style="color: var(--text-muted)">High-performance real-time communication</p>
        </header>

        <main>
            <div class="status-bar">
                <div>
                    <span style="color: var(--text-muted); font-size: 0.875rem">YOUR IDENTITY</span>
                    <div id="user-name" class="user-tag">Connecting...</div>
                </div>
                
                <div id="answer" class="offer-list">
                    <!-- Available offers will be injected here -->
                </div>

                <div class="controls">
                    <button id="call" class="btn btn-primary">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        Start Call
                    </button>
                    <button id="hangup" class="btn btn-danger" style="display: none;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L9.764 4.18a1 1 0 00-.948-.684H5z"></path></svg>
                        Hang Up
                    </button>
                </div>
            </div>

            <div class="video-grid">
                <div class="video-container">
                    <div id="waiting">Waiting for answer...</div>
                    <video id="local-video" autoplay playsinline muted></video>
                    <div class="video-label">Local Preview</div>
                </div>
                <div class="video-container">
                    <video id="remote-video" autoplay playsinline></video>
                    <div class="video-label">Remote Participant</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src='scripts.js'></script>
</body>
</html>
